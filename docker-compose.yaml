services:

  # ---------------------------------------------------------------------------
  # SvelteKit app
  # ---------------------------------------------------------------------------
  app:
    image: kupon-kurban:runner-1.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis

  # ---------------------------------------------------------------------------
  # BullMQ worker — scale dengan: docker compose up --scale worker=3
  # ---------------------------------------------------------------------------
  worker:
    image: kupon-kurban:worker-1.0.0
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - redis
    # Tidak ada port karena worker hanya consume queue
    deploy:
      replicas: 1   # default 2 instance; ubah sesuai kebutuhan

  # ---------------------------------------------------------------------------
  # Redis — BullMQ backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ---------------------------------------------------------------------------
  # PostgreSQL — Drizzle target
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-app}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
  #     POSTGRES_DB: ${POSTGRES_DB:-appdb}
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
